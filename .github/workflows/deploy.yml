name: CI/CD Render

on:
  push:
    branches:
      - main
    paths-ignore:
      - "frontend/**"

concurrency:
  group: render-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clear Docker auth
        run: |
          unset DOCKER_AUTH_CONFIG
          rm -f ~/.docker/config.json || true
          mkdir -p ~/.docker

      - name: Compute normalized names
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          ACTOR=$(echo "${{ github.actor }}" | tr '[:upper:]' '[:lower:]')

          SERVICE_NAME="flask-render-iac-${ACTOR}"
          ADMINER_NAME="adminer-${ACTOR}"
          IMAGE_URL="ghcr.io/${OWNER}/flask-render-iac"
          IMAGE_TAG="${{ github.sha }}"

          echo "OWNER=${OWNER}" >> "$GITHUB_ENV"
          echo "ACTOR=${ACTOR}" >> "$GITHUB_ENV"
          echo "SERVICE_NAME=${SERVICE_NAME}" >> "$GITHUB_ENV"
          echo "ADMINER_NAME=${ADMINER_NAME}" >> "$GITHUB_ENV"
          echo "IMAGE_URL=${IMAGE_URL}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build -t "${IMAGE_URL}:${IMAGE_TAG}" .
          docker push "${IMAGE_URL}:${IMAGE_TAG}"

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Delete existing Render services
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          RESPONSE=$(curl -fsS \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            https://api.render.com/v1/services)

          for NAME in "${SERVICE_NAME}" "${ADMINER_NAME}"; do
            SERVICE_ID=$(echo "$RESPONSE" \
              | jq -r --arg NAME "$NAME" '
                  .[]
                  | select(type == "object" and .service != null)
                  | select(.service.name == $NAME)
                  | .service.id
                ' \
              | head -n 1)

            if [ -z "$SERVICE_ID" ] || [ "$SERVICE_ID" = "null" ]; then
              echo "No existing Render service named ${NAME}."
            else
              echo "Deleting ${NAME} (${SERVICE_ID})"
              curl -fsS -X DELETE \
                -H "Authorization: Bearer ${RENDER_API_KEY}" \
                "https://api.render.com/v1/services/${SERVICE_ID}"
            fi
          done

      - name: Wait after deletion
        run: sleep 20

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_render_api_key: ${{ secrets.RENDER_API_KEY }}
          TF_VAR_render_owner_id: ${{ secrets.RENDER_OWNER_ID }}
          TF_VAR_database_url: ${{ secrets.DATABASE_URL }}
        run: |
          terraform apply -auto-approve \
            -var="image_url=${IMAGE_URL}" \
            -var="image_tag=${IMAGE_TAG}" \
            -var="github_actor=${ACTOR}"
